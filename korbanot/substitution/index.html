<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laws of Substitution</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a1a;color:#e0d5c1;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a1a 0%,#2a2520 100%);border-bottom:2px solid #c9a84c;padding:1.5rem 1rem;text-align:center}
.back{display:inline-block;color:#c9a84c;text-decoration:none;font-size:0.9rem;margin-bottom:0.5rem}
.back:hover{text-decoration:underline}
.header h1{font-size:2rem;color:#c9a84c;margin-bottom:0.2rem}
.header .he{font-size:1.3rem;color:#a89060}
.header .info{font-size:0.9rem;color:#888;margin-top:0.5rem}
.container{max-width:700px;margin:0 auto;padding:1rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:0.8rem;margin-top:1rem}
.perek{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.2rem 0.5rem;border-radius:10px;background:#222;border:1px solid #333;text-decoration:none;color:#e0d5c1;transition:all 0.2s}
.perek:hover{background:#2a2520;border-color:#c9a84c;transform:translateY(-2px)}
.perek.done{border-color:#c9a84c60;background:#2a252080}
.perek.done .check{display:block}
.perek .num-he{font-size:1.4rem;color:#c9a84c;font-weight:bold}
.perek .num-en{font-size:0.8rem;color:#888;margin-top:0.2rem}
.perek .check{display:none;color:#c9a84c;font-size:0.7rem;margin-top:0.3rem}
.footer{text-align:center;padding:2rem 1rem;color:#555;font-size:0.85rem}
@media(max-width:400px){.grid{grid-template-columns:repeat(auto-fill,minmax(80px,1fr))}}
</style>
</head>
<body>
<div class="header">
  <a href="../../" class="back">← Mishneh Torah</a>
  <h1>Substitution</h1>
  <div class="he">הלכות תמורה</div>
  <div class="info">🔥 Sefer Korbanot · 4 פרקים</div>
</div>
<div class="container">
  <div class="grid">
    <a href="1/" class="perek">
      <span class="num-he">פרק א</span>
      <span class="num-en">Chapter 1</span>
      <span class="check">✓</span>
    </a>
    <a href="2/" class="perek">
      <span class="num-he">פרק ב</span>
      <span class="num-en">Chapter 2</span>
      <span class="check">✓</span>
    </a>
    <a href="3/" class="perek">
      <span class="num-he">פרק ג</span>
      <span class="num-en">Chapter 3</span>
      <span class="check">✓</span>
    </a>
    <a href="4/" class="perek">
      <span class="num-he">פרק ד</span>
      <span class="num-en">Chapter 4</span>
      <span class="check">✓</span>
    </a>
  </div>
</div>
<div class="footer">
  Content from <a href="https://www.sefaria.org" target="_blank" style="color:#c9a84c;text-decoration:none">Sefaria</a>
</div>
</body>
</html>
